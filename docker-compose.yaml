# Local-dev / production-shape compose for brl.
#
# Pulls the published image from kibble by default; override
# BRL_TAG to pin a specific version.
#
# brl is stateless — uploads and converted outputs live in
# /tmp/brl (created in the Dockerfile, owned by the
# unprivileged runtime user). Container restart wipes them.
#
# To override the curated table catalog without rebuilding,
# bind-mount your own tables.yaml at /app/config/tables.yaml.
# liblouis ships the actual .ctb / .utb files in the image
# (via apt's liblouis-data); your catalog only needs the
# slug -> filename mapping.
#
# The CI E2E suite at tests/test_e2e.py uses a locally-built
# image instead — see .github/workflows/test.yml.

services:
  brl:
    image: kibble.apps.blindhub.ca/cobdfamily/brl:${BRL_TAG:-latest}
    container_name: brl
    ports:
      - "${BRL_HTTP_PORT:-8000}:8000"
    # volumes:
    #   - ./tables.yaml:/app/config/tables.yaml:ro
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/', timeout=2).status==200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    # Container hardening (fleet standard, matches needle):
    # lock the root filesystem, drop all Linux capabilities,
    # and block privilege escalation. url2code writes uploads
    # and converted outputs under /tmp/brl/* (the executor
    # mkdir -p's them per request), so /tmp is a writable
    # tmpfs rather than the read-only root.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
