# Curated catalog of liblouis translation tables this
# deployment exposes.
#
# This file is the canonical source of truth. brl-translate
# reads it at request time to resolve a slug to a liblouis
# .ctb / .utb filename; /tables serves it (converted to JSON
# on the wire by bin/cat-yaml-as-json) for client discovery.
#
# Adding a slug:
#   1. Confirm the .ctb / .utb file exists in the image:
#        docker exec brl ls /usr/share/liblouis/tables | grep <name>
#      If not, add a downstream image that drops the file
#      into /usr/share/liblouis/tables (or pin a specific
#      liblouis-data version that ships it).
#   2. Add an entry below.
#
# Per-entry fields:
#   slug   URL-safe slug; what callers pass as the `table`
#          form param on /translate and /translate/file.
#   table  liblouis table filename (e.g. "en-ueb-g2.ctb").
#          Looked up under /usr/share/liblouis/tables/.
#   name   Human-readable label (for clients).

# --- English ---

- slug: en-ueb-g1
  table: en-ueb-g1.ctb
  name: English (Unified English Braille) Grade 1 - uncontracted

- slug: en-ueb-g2
  table: en-ueb-g2.ctb
  name: English (Unified English Braille) Grade 2 - contracted

- slug: en-us-g1
  table: en-us-g1.ctb
  name: US English Grade 1 - uncontracted (legacy EBAE)

- slug: en-us-g2
  table: en-us-g2.ctb
  name: US English Grade 2 - contracted (legacy EBAE)

- slug: en-gb-g2
  table: en-gb-g2.ctb
  name: British English Grade 2 - contracted (legacy SEB)

# --- Math ---

- slug: nemeth
  table: nemeth.ctb
  name: Nemeth braille code (US mathematics)

# --- French ---

