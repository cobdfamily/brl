  name: French (Braille Francais Uniformise) Grade 2

# --- German ---

- slug: de-g0
  table: de-g0.utb
  name: German Grade 0 - uncontracted

- slug: de-g2
  table: de-g2.ctb
  name: German Grade 2 - contracted

# --- Spanish ---

- slug: es-g1
  table: es-g1.ctb
  name: Spanish Grade 1

- slug: es-g2
  table: es-g2.ctb
  name: Spanish Grade 2

# --- Other European ---

- slug: it
